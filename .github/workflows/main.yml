// ===================== GYM =====================
function buildGym() {
  document.getElementById('screen-gym').innerHTML = `
    <div class="sub-tabs">
      <div class="sub-tab ${gymSubTab==='plan'?'active':''}" onclick="setGymSub('plan')">Plan</div>
      <div class="sub-tab ${gymSubTab==='log'?'active':''}" onclick="setGymSub('log')">Log Workout</div>
      <div class="sub-tab ${gymSubTab==='history'?'active':''}" onclick="setGymSub('history')">History</div>
    </div>
    <div id="gym-sub-content"></div>
  `;
  renderGymSub();
}

function setGymSub(tab) {
  gymSubTab = tab;
  buildGym();
}

function renderGymSub() {
  const el = document.getElementById('gym-sub-content');
  if(gymSubTab==='plan') renderPlan(el);
  else if(gymSubTab==='log') renderLog(el);
  else renderHistory(el);
}

function renderPlan(el) {
  const s = SESSIONS[currentSession];
  const isCardio = s.type==='cardio', isRest = s.type==='rest';
  const hClass = isCardio?'cardio-header':isRest?'rest-header':'';
  const pillClass = isCardio?'pill-blue':'pill-green';
  const exercisesHtml = isRest
    ? `<div class="empty-state"><div class="empty-icon">😴</div><div class="empty-text">Rest day. Let your muscles recover.<br>Optional: 20-30 min easy walk.</div></div>`
    : s.exercises.map(e => `<div class="exercise-card">
        <div class="exercise-name">${e.name}</div>
        <div class="exercise-stats">
          <div class="ex-stat"><div class="ex-stat-label">SETS</div><div class="ex-stat-val ${isCardio?'blue':'green'}">${e.sets}</div></div>
          <div class="ex-stat"><div class="ex-stat-label">REPS / TIME</div><div class="ex-stat-val">${e.reps}</div></div>
          <div class="ex-stat"><div class="ex-stat-label">WEIGHT</div><div class="ex-stat-val">${e.weight}</div></div>
        </div>
        ${e.tip?`<div class="exercise-tip">💡 ${e.tip}</div>`:''}
      </div>`).join('');

  el.innerHTML = `
    <div class="session-selector">${SESSIONS.map((ses,i)=>`<div class="session-btn ${ses.type}${i===currentSession?' active':''}" onclick="currentSession=${i};renderPlan(document.getElementById('gym-sub-content'))">${ses.label}</div>`).join('')}</div>
    <div class="session-header ${hClass}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><div class="session-name">${s.name}</div><div class="session-focus">${s.focus}</div></div>
        ${!isRest?`<span class="pill ${pillClass}" style="margin-top:4px;flex-shrink:0;">${s.type.toUpperCase()}</span>`:''}
      </div>
      <div class="session-meta">
        <span class="pill ${isRest?'':''+pillClass}" style="${isRest?'background:var(--surface2);color:var(--text2);':''}">⏱ ${s.duration}</span>
        ${s.warmup?`<span class="pill" style="background:var(--surface2);color:var(--text2);">🔥 ${s.warmup}</span>`:''}
      </div>
    </div>
    ${!isRest?`<div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">REST 60-90 SECS BETWEEN SETS</div>`:''}
    ${exercisesHtml}
  `;
}

// ===================== WORKOUT LOGGER =====================
function renderLog(el) {
  if(activeWorkout) {
    renderActiveWorkout(el);
    return;
  }
  const gymSessions = SESSIONS.filter(s => s.type !== 'rest');
  el.innerHTML = `
    <div style="font-size:13px;color:var(--text2);margin-bottom:14px;">Pick today's session, then log your actual sets, weights and reps.</div>
    <div class="logger-session-grid">
      ${gymSessions.map(s => {
        const isSelected = selectedLogSession === s.id;
        const bg = s.type==='cardio'?'var(--blue-dim)':'var(--green-dim)';
        return `<div class="logger-session-card ${s.type==='cardio'?'cardio-card':''} ${isSelected?'selected':''}" onclick="selectLogSession('${s.id}')">
          <div class="lsc-check">✓</div>
          <div class="lsc-icon">${s.icon}</div>
          <div class="lsc-name">${s.name}</div>
          <div class="lsc-focus">${s.focus}</div>
        </div>`;
      }).join('')}
    </div>
    <button class="start-workout-btn" onclick="startWorkout()" ${!selectedLogSession?'disabled':''}>
      ${selectedLogSession ? 'START WORKOUT' : 'SELECT A SESSION ABOVE'}
    </button>
  `;
}

function selectLogSession(id) {
  selectedLogSession = id;
  renderLog(document.getElementById('gym-sub-content'));
}

function startWorkout() {
  if(!selectedLogSession) return;
  const session = SESSIONS.find(s => s.id === selectedLogSession);
  activeWorkout = {
    sessionId: selectedLogSession,
    sessionName: session.name,
    date: new Date().toISOString(),
    exercises: session.exercises.map(e => ({
      name: e.name,
      target: `${e.sets} sets x ${e.reps} @ ${e.weight}`,
      sets: [{ kg:'', reps:'', done:false }]
    }))
  };
  renderActiveWorkout(document.getElementById('gym-sub-content'));
}

function renderActiveWorkout(el) {
  if(!activeWorkout) return;
  const dateStr = fmtDate(activeWorkout.date);
  el.innerHTML = `
    <div class="active-logger visible">
      <div class="logger-header">
        <div>
          <div class="logger-header-name">${activeWorkout.sessionName}</div>
          <div class="logger-header-date">${dateStr}</div>
        </div>
        <button class="end-btn" onclick="endWorkout()">FINISH</button>
      </div>
      <div style="font-size:11px;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px;">Tap an exercise to expand · Check off each set when done</div>
      ${activeWorkout.exercises.map((ex, ei) => {
        const doneSets = ex.sets.filter(s=>s.done).length;
        const summary = doneSets > 0 ? `${doneSets} set${doneSets>1?'s':''} done` : '';
        return `<div class="log-exercise-card" id="lec-${ei}">
          <div class="lec-header" onclick="toggleExercise(${ei})">
            <div class="lec-name">${ex.name}</div>
            ${summary?`<div class="lec-summary">${summary}</div>`:''}
            <div class="lec-chevron" id="chevron-${ei}">▼</div>
          </div>
          <div class="lec-body" id="lec-body-${ei}">
            <div class="lec-target">Target: ${ex.target}</div>
            <table class="sets-table">
              <thead><tr>
                <th style="width:28px">SET</th>
                <th>KG</th>
                <th>REPS</th>
                <th style="width:40px">DONE</th>
              </tr></thead>
              <tbody id="sets-body-${ei}">
                ${ex.sets.map((set, si) => renderSetRow(ei, si, set)).join('')}
              </tbody>
            </table>
            <button class="add-set-btn" onclick="addSet(${ei})">+ Add Set</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
  // Auto-open first exercise
  if(activeWorkout.exercises.length > 0) toggleExercise(0);
}

function renderSetRow(ei, si, set) {
  return `<tr id="set-row-${ei}-${si}">
    <td><div class="set-num">${si+1}</div></td>
    <td><input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${set.kg}" onchange="updateSet(${ei},${si},'kg',this.value)"></td>
    <td><input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)"></td>
    <td><button class="set-done-btn ${set.done?'done':''}" id="done-btn-${ei}-${si}" onclick="toggleSetDone(${ei},${si})">${set.done?'✓':'○'}</button></td>
  </tr>`;
}

function toggleExercise(ei) {
  const body = document.getElementById(`lec-body-${ei}`);
  const chev = document.getElementById(`chevron-${ei}`);
  if(!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function updateSet(ei, si, field, value) {
  if(!activeWorkout) return;
  activeWorkout.exercises[ei].sets[si][field] = value;
}

function toggleSetDone(ei, si) {
  if(!activeWorkout) return;
  activeWorkout.exercises[ei].sets[si].done = !activeWorkout.exercises[ei].sets[si].done;
  const btn = document.getElementById(`done-btn-${ei}-${si}`);
  const set = activeWorkout.exercises[ei].sets[si];
  btn.className = `set-done-btn ${set.done?'done':''}`;
  btn.textContent = set.done ? '✓' : '○';
  // Update summary
  const doneSets = activeWorkout.exercises[ei].sets.filter(s=>s.done).length;
  const headerEl = document.querySelector(`#lec-${ei} .lec-summary`);
  const nameEl = document.querySelector(`#lec-${ei} .lec-name`);
  if(doneSets > 0) {
    if(headerEl) headerEl.textContent = `${doneSets} set${doneSets>1?'s':''} done`;
    else if(nameEl) nameEl.insertAdjacentHTML('afterend', `<div class="lec-summary">${doneSets} set${doneSets>1?'s':''} done</div>`);
  }
}

function addSet(ei) {
  if(!activeWorkout) return;
  activeWorkout.exercises[ei].sets.push({ kg:'', reps:'', done:false });
  const tbody = document.getElementById(`sets-body-${ei}`);
  const si = activeWorkout.exercises[ei].sets.length - 1;
  tbody.insertAdjacentHTML('beforeend', renderSetRow(ei, si, { kg:'', reps:'', done:false }));
}

function endWorkout() {
  if(!activeWorkout) return;
  // Save only exercises with at least one logged set
  const toSave = {
    ...activeWorkout,
    exercises: activeWorkout.exercises.map(ex => ({
      ...ex,
      sets: ex.sets.filter(s => s.kg || s.reps)
    })).filter(ex => ex.sets.length > 0)
  };
  if(toSave.exercises.length > 0) {
    workoutHistory.unshift(toSave);
    localStorage.setItem('wf_workouts', JSON.stringify(workoutHistory));
    showToast('Workout saved!');
  }
  activeWorkout = null;
  selectedLogSession = null;
  gymSubTab = 'history';
  buildGym();
}

// ===================== HISTORY =====================
function renderHistory(el) {
  if(!workoutHistory.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No workouts logged yet.<br>Head to "Log Workout" to start tracking.</div></div>`;
    return;
  }
  el.innerHTML = workoutHistory.map((w, wi) => `
    <div class="workout-history-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div class="wh-date">${fmtDate(w.date)}</div>
        <button onclick="deleteWorkout(${wi})" style="background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:2px 6px;">✕</button>
      </div>
      <div class="wh-session">${w.sessionName}</div>
      ${w.exercises.map(ex => {
        const logged = ex.sets.filter(s=>s.done||s.kg||s.reps);
        const best = logged.reduce((b,s) => parseFloat(s.kg||0) > parseFloat(b.kg||0) ? s : b, logged[0] || {});
        const summary = logged.length
          ? `${logged.length} set${logged.length>1?'s':''} · best: ${best.kg||'?'}kg x ${best.reps||'?'}`
          : 'No sets logged';
        return `<div class="wh-exercise">${ex.name}<span class="wh-sets">${summary}</span></div>`;
      }).join('')}
    </div>
  `).join('');
}

function deleteWorkout(wi) {
  workoutHistory.splice(wi, 1);
  localStorage.setItem('wf_workouts', JSON.stringify(workoutHistory));
  renderHistory(document.getElementById('gym-sub-content'));
}

// ===================== PROGRESS =====================
function adjustWeight(delta) {
  inputWeight = Math.max(40, Math.min(200, Math.round((inputWeight + delta) * 10) / 10));
  document.getElementById('input-weight').textContent = inputWeight.toFixed(1);
}

function logWeight() {
  const today = new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
  const existing = weightLog.findIndex(e => e.date===today);
  if(existing>=0) weightLog[existing].kg = inputWeight;
  else weightLog.push({date:today, kg:inputWeight});
  localStorage.setItem('wf_log', JSON.stringify(weightLog));
  showToast('Weight logged: ' + inputWeight.toFixed(1) + 'kg');
  buildProgress();
  buildHome();
}

function deleteLog(idx) {
  weightLog.splice(idx, 1);
  localStorage.setItem('wf_log', JSON.stringify(weightLog));
  buildProgress();
  buildHome();
}

function buildProgress() {
  const lost = getLost(), current = getCurrent(), pct = Math.min(100, Math.round(lost/10*100));
  const sorted = [...weightLog].reverse();
  const logHtml = !weightLog.length
    ? `<div class="empty-state"><div class="empty-icon">⚖️</div><div class="empty-text">No entries yet. Log your first weight above!</div></div>`
    : sorted.map((e,i) => {
        const prev = sorted[i+1];
        const diff = prev ? Math.round((e.kg-prev.kg)*10)/10 : 0;
        const cls = diff<0?'down':diff>0?'up':'same';
        const txt = !prev?'Starting weight':diff===0?'No change':(diff>0?'+':'')+diff.toFixed(1)+'kg';
        const origIdx = weightLog.findIndex(w=>w.date===e.date&&w.kg===e.kg);
        return `<div class="log-entry">
          <div><div class="log-date">${e.date}</div><div class="log-diff ${cls}">${txt}</div></div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="log-kg">${e.kg.toFixed(1)}<span style="font-size:13px;color:var(--text2);font-family:-apple-system,'Helvetica Neue',sans-serif"> kg</span></div>
            <button class="delete-btn" onclick="deleteLog(${origIdx})">✕</button>
          </div>
        </div>`;
      }).join('');

  document.getElementById('screen-progress').innerHTML = `
    <div class="weight-input-card">
      <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;">Log Today's Weight</div>
      <div class="weight-btns">
        <button class="weight-btn minus" onclick="adjustWeight(-0.1)">−</button>
        <div class="weight-val-display" id="input-weight">${inputWeight.toFixed(1)}</div>
        <button class="weight-btn plus" onclick="adjustWeight(0.1)">+</button>
      </div>
      <button class="log-btn" onclick="logWeight()">LOG WEIGHT</button>
    </div>
    <div class="card" style="padding:14px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-size:12px;font-weight:600;color:var(--text2);">GOAL PROGRESS</span>
        <span style="font-size:12px;color:var(--green);font-weight:600;">${pct}%</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--text2);margin-top:8px;">Start: 91kg · Current: ${current.toFixed(1)}kg · Goal: 81kg</div>
    </div>
    <div class="section-label">Weight Log</div>
    <div class="card">${logHtml}</div>
  `;
}

// ===================== INIT =====================
buildHome(); buildMeals(); buildGym(); buildProgress();
switchTab('home');
</script>
</body>
</html>
