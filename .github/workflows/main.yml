<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AP's PT">
<title>AP's PT</title>

<style>
  :root {
    --bg:#0a0a0a; --surface:#141414; --surface2:#1c1c1c; --surface3:#242424;
    --border:#2a2a2a; --green:#39d98a; --green-dim:#1a4a35; --blue:#4da6ff;
    --blue-dim:#1a2e4a; --orange:#ff8c42; --orange-dim:#3d2410; --red:#ff4f4f;
    --text:#f0f0f0; --text2:#888; --text3:#555; --radius:16px; --radius-sm:10px; --tab-h:72px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);font-family:-apple-system,'Helvetica Neue',sans-serif;color:var(--text);overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;}
  .status-bar{height:44px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
  .status-time{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
  .status-icons{display:flex;gap:6px;align-items:center;}
  .header{padding:8px 20px 16px;flex-shrink:0;}
  .header-title{font-family:'Arial Black','Arial Bold',Impact,sans-serif;font-size:32px;letter-spacing:1px;line-height:1;}
  .header-sub{font-size:13px;color:var(--text2);margin-top:2px;}
  .scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 16px 16px;}
  .scroll-area::-webkit-scrollbar{display:none;}
  .tab-bar{height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding-bottom:8px;}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 12px;border-radius:12px;transition:all 0.2s;flex:1;}
  .tab svg{width:22px;height:22px;transition:all 0.2s;}
  .tab span{font-size:10px;font-weight:500;color:var(--text3);transition:all 0.2s;letter-spacing:0.2px;}
  .tab.active svg{color:var(--green);filter:drop-shadow(0 0 6px var(--green));}
  .tab.active span{color:var(--green);}
  .tab:not(.active) svg{color:var(--text3);}
  .screen{display:none;animation:fadeUp 0.25s ease;}
  .screen.active{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border);}
  .card-sm{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);}
  .section-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin:20px 0 10px;}
  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
  .pill-green{background:var(--green-dim);color:var(--green);}
  .pill-blue{background:var(--blue-dim);color:var(--blue);}
  .pill-orange{background:var(--orange-dim);color:var(--orange);}
  .progress-bar-wrap{background:var(--surface2);border-radius:100px;height:8px;overflow:hidden;margin:8px 0;}
  .progress-bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--green),#5effa8);transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);}

  /* HOME */
  .goal-card{background:linear-gradient(135deg,#0f2e1f 0%,#1a4a35 50%,#0a1a10 100%);border:1px solid var(--green-dim);border-radius:var(--radius);padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
  .goal-card::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(57,217,138,0.12) 0%,transparent 70%);}
  .goal-card-label{font-size:11px;color:var(--green);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .goal-card-main{font-family:'Arial Black','Arial Bold',Impact,sans-serif;font-size:52px;color:var(--green);line-height:1;letter-spacing:1px;}
  .goal-card-sub{font-size:13px;color:rgba(57,217,138,0.7);margin-top:4px;}
  .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;}
  .stat-val{font-family:'Arial Black','Arial Bold',Impact,sans-serif;font-size:26px;color:var(--text);letter-spacing:0.5px;line-height:1;}
  .stat-label{font-size:10px;color:var(--text3);margin-top:3px;font-weight:500;}
  .today-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .today-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;}
  .today-meal{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
  .today-meal:last-child{border-bottom:none;padding-bottom:0;}
  .meal-time-badge{background:var(--surface2);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;min-width:48px;text-align:center;}
  .meal-text{font-size:13px;color:var(--text);line-height:1.45;flex:1;}
  .meal-macro{font-size:11px;color:var(--green);margin-top:2px;font-weight:500;}

  /* MEALS */
  .day-selector{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;}
  .day-selector::-webkit-scrollbar{display:none;}
  .day-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.2s;}
  .day-btn.active{background:var(--green);color:#000;border-color:var(--green);box-shadow:0 0 12px rgba(57,217,138,0.3);}
  .meal-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;border:1px solid var(--border);}
  .meal-card.free-meal{border-color:var(--orange-dim);}
  .meal-card-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
  .meal-card.free-meal .meal-card-header{background:var(--orange-dim);}
  .meal-card-time{font-family:'Arial Black','Arial Bold',Impact,sans-serif;font-size:22px;letter-spacing:1px;}
  .meal-card-body{padding:14px 16px;}
  .meal-components{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .component-tag{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--text2);}
  .portions-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .portion-item{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border);}
  .portion-food{font-size:13px;font-weight:600;margin-bottom:2px;}
  .portion-amount{font-size:18px;font-family:'Arial Black','Arial Bold',Impact,sans-serif;color:var(--green);letter-spacing:0.5px;}
  .portion-tip{font-size:11px;color:var(--text3);margin-top:2px;}

  /* GYM — sub-tabs */
  .sub-tabs{display:flex;gap:0;margin-bottom:16px;background:var(--surface2);border-radius:12px;padding:4px;border:1px solid var(--border);}
  .sub-tab{flex:1;text-align:center;padding:8px 4px;border-radius:9px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.2s;}
  .sub-tab.active{background:var(--green);color:#000;}

  /* GYM — plan view */
  .session-selector{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;}
  .session-selector::-webkit-scrollbar{display:none;}
  .session-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.2s;}
  .session-btn.active{background:var(--green);color:#000;border-color:var(--green);box-shadow:0 0 12px rgba(57,217,138,0.3);}
  .session-btn.cardio.active{background:var(--blue);border-color:var(--blue);color:#000;}
  .session-btn.rest.active{background:var(--surface3);border-color:var(--text3);color:var(--text2);}
  .session-header{background:linear-gradient(135deg,#0f2e1f,#1a1a1a);border:1px solid var(--green-dim);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .session-header.cardio-header{background:linear-gradient(135deg,#0d1e2e,#1a1a1a);border-color:var(--blue-dim);}
  .session-header.rest-header{background:var(--surface);border-color:var(--border);}
  .session-name{font-family:'Arial Black','Arial Bold',Impact,sans-serif;font-size:28px;letter-spacing:1px;}
  .session-focus{font-size:12px;color:var(--text2);margin-top:2px;}
  .session-meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .exercise-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;border:1px solid var(--border);}
  .exercise-name{font-size:14px;font-weight:600;margin-bottom:8px;}
  .exercise-stats{display:flex;gap:8px;flex-wrap:wrap;}
  .ex-stat{background:var(--surface2);border-radius:8px;padding:5px 10px;}
  .ex-stat-label{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.3px;}
  .ex-stat-val{font-size:13px;font-weight:600;margin-top:1px;}
  .ex-stat-val.green{color:var(--green);}
  .ex-stat-val.blue{color:var(--blue);}
  .exercise-tip{font-size:12px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-style:italic;}

  /* WORKOUT LOGGER */
  .logger-session-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .logger-session-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;cursor:pointer;transition:all 0.2s;position:relative;}
  .logger-session-card:active{transform:scale(0.97);}
  .logger-session-card.selected{border-color:var(--green);background:var(--green-dim);}
  .logger-session-card.cardio-card.selected{border-color:var(--blue);background:var(--blue-dim);}
  .lsc-icon{font-size:22px;margin-bottom:6px;}
  .lsc-name{font-size:13px;font-weight:600;color:var(--text);}
  .lsc-focus{font-size:11px;color:var(--text3);margin-top:2px;}
  .lsc-check{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:var(--green);display:none;align-items:center;justify-content:center;font-size:11px;color:#000;font-weight:700;}
  .logger-session-card.selected .lsc-check{display:flex;}

  .start-workout-btn{width:100%;padding:15px;background:var(--green);border:none;border-radius:var(--radius-sm);color:#000;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px;letter-spacing:0.5px;transition:all 0.15s;}
  .start-workout-btn:active{transform:scale(0.98);opacity:0.9;}
  .start-workout-btn:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;}

  /* Active logger */
  .active-logger{display:none;}
  .active-logger.visible{display:block;}
  .logger-header{background:linear-gradient(135deg,#0f2e1f,#1a1a1a);border:1px solid var(--green-dim);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .logger-header-name{font-family:'Arial Black','Arial Bold',Impact,sans-serif;font-size:24px;letter-spacing:1px;}
  .logger-header-date{font-size:11px;color:var(--text2);margin-top:2px;}
  .end-btn{padding:8px 16px;background:var(--red);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;}

  .log-exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden;}
  .lec-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
  .lec-name{font-size:13px;font-weight:600;flex:1;}
  .lec-summary{font-size:11px;color:var(--green);font-weight:600;margin-left:8px;}
  .lec-chevron{font-size:12px;color:var(--text3);transition:transform 0.2s;flex-shrink:0;margin-left:6px;}
  .lec-chevron.open{transform:rotate(180deg);}
  .lec-body{display:none;padding:0 14px 12px;}
  .lec-body.open{display:block;}
  .lec-target{font-size:11px;color:var(--text3);margin-bottom:10px;font-style:italic;}

  .sets-table{width:100%;border-collapse:collapse;margin-bottom:10px;}
  .sets-table th{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:0.8px;text-transform:uppercase;padding:4px 6px;text-align:center;}
  .sets-table td{padding:4px 4px;}
  .set-num{font-size:12px;color:var(--text3);font-weight:600;text-align:center;width:28px;}
  .set-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 8px;font-size:14px;font-weight:600;color:var(--text);text-align:center;width:100%;font-family:-apple-system,'Helvetica Neue',sans-serif;-webkit-appearance:none;}
  .set-input:focus{outline:none;border-color:var(--green);}
  .set-input::placeholder{color:var(--text3);}
  .set-done-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;margin:0 auto;}
  .set-done-btn.done{background:var(--green);border-color:var(--green);color:#000;}
  .add-set-btn{width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .add-set-btn:active{opacity:0.7;}

  .workout-history-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;}
  .wh-date{font-size:12px;color:var(--text2);margin-bottom:4px;}
  .wh-session{font-size:15px;font-weight:600;margin-bottom:8px;}
  .wh-exercise{font-size:12px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);}
  .wh-exercise:last-child{border-bottom:none;padding-bottom:0;}
  .wh-sets{float:right;color:var(--green);font-weight:600;}

  /* PROGRESS */
  .weight-input-card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:12px;border:1px solid var(--border);}
  .weight-btns{display:flex;gap:10px;align-items:center;justify-content:center;}
  .weight-btn{width:56px;height:56px;border-radius:50%;border:none;font-size:24px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;font-weight:300;}
  .weight-btn.minus{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .weight-btn.plus{background:var(--green);color:#000;}
  .weight-btn:active{transform:scale(0.92);}
  .weight-val-display{font-family:'Arial Black','Arial Bold',Impact,sans-serif;font-size:42px;color:var(--text);min-width:100px;text-align:center;letter-spacing:1px;}
  .log-btn{width:100%;padding:15px;background:var(--green);border:none;border-radius:var(--radius-sm);color:#000;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;letter-spacing:0.5px;transition:all 0.15s;}
  .log-btn:active{transform:scale(0.98);opacity:0.9;}
  .log-entry{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
  .log-entry:last-child{border-bottom:none;}
  .log-date{font-size:13px;color:var(--text2);}
  .log-kg{font-family:'Arial Black','Arial Bold',Impact,sans-serif;font-size:22px;letter-spacing:0.5px;}
  .log-diff{font-size:12px;font-weight:600;}
  .log-diff.down{color:var(--green);}
  .log-diff.up{color:var(--red);}
  .log-diff.same{color:var(--text3);}
  .delete-btn{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:4px 8px;}
  .empty-state{text-align:center;padding:40px 20px;}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-text{font-size:14px;color:var(--text3);}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:calc(100% - 32px);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <div class="status-bar">
    <div class="status-time" id="clock">9:41</div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor" style="color:#f0f0f0"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity="0.3"/></svg>
      <svg width="20" height="12" viewBox="0 0 24 12" fill="currentColor" style="color:#f0f0f0"><rect x="0" y="2" width="20" height="8" rx="2" stroke="#f0f0f0" stroke-width="1.5" fill="none"/><rect x="1.5" y="3.5" width="13" height="5" rx="1"/><rect x="21" y="4" width="2.5" height="4" rx="1"/></svg>
    </div>
  </div>
  <div class="header">
    <div class="header-title" id="screen-title">AP'S PT</div>
    <div class="header-sub" id="screen-sub">Your wedding body starts today</div>
  </div>
  <div class="scroll-area" id="scroll-area">
    <div class="screen active" id="screen-home"></div>
    <div class="screen" id="screen-meals"></div>
    <div class="screen" id="screen-gym"></div>
    <div class="screen" id="screen-progress"></div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('home')" id="tab-home">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </div>
    <div class="tab" onclick="switchTab('meals')" id="tab-meals">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-4-6.35-6-9.52-6C3.35 8.99 1 11.01 1 14.99h15.03z"/></svg>
      <span>Meals</span>
    </div>
    <div class="tab" onclick="switchTab('gym')" id="tab-gym">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/></svg>
      <span>Gym</span>
    </div>
    <div class="tab" onclick="switchTab('progress')" id="tab-progress">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
      <span>Progress</span>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ===================== DATA =====================
const MEALS = [
  { day:"Day 1", lunch:"Grilled chicken thighs + brown rice + cucumber & capsicum salad", lunchPortions:["200g chicken","70g dry rice","Unlimited veg","1 tbsp olive oil"], dinner:"Pan-fried salmon + steamed broccoli + sweet potato wedges", dinnerPortions:["200g salmon","200g sweet potato","Unlimited broccoli"], freeMeal:null },
  { day:"Day 2", lunch:"Chicken breast & chickpea wrap", lunchPortions:["200g chicken","1 large wrap","100g chickpeas","2 tbsp hummus"], dinner:"Lamb mince stir-fry with mixed veggies + brown rice", dinnerPortions:["150g lamb mince","70g dry rice","Unlimited veggies"], freeMeal:null },
  { day:"Day 3", lunch:"FREE MEAL", lunchPortions:[], dinner:"Grilled chicken breast + roasted pumpkin & zucchini + quinoa", dinnerPortions:["200g chicken","65g dry quinoa","Unlimited veg"], freeMeal:"lunch" },
  { day:"Day 4", lunch:"Tuna salad bowl", lunchPortions:["1 x 185g tin tuna","Unlimited leafy greens","Corn & cucumber","1 tbsp olive oil + lemon"], dinner:"FREE MEAL", dinnerPortions:[], freeMeal:"dinner" },
