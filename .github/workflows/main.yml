        <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${s.label}</div><div style="font-size:12px;color:var(--text2);margin-top:1px;">${s.name}</div></div>
        <div style="font-size:11px;font-weight:600;color:${color};">${s.duration}</div>
      </div>`;
    }).join('')}
  `;
