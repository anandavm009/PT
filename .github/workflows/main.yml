// ===================== UTILS =====================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
}
updateClock(); setInterval(updateClock, 10000);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short' });
}

const tabHeaders = {
  home:["AP'S PT","Your wedding body starts today"],
  meals:["MEAL PLAN","What to eat and how much"],
  gym:["GYM PLAN","4 sessions per week"],
  progress:["PROGRESS","Track your weight loss"],
};

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('screen-title').textContent = tabHeaders[tab][0];
  document.getElementById('screen-sub').textContent = tabHeaders[tab][1];
  document.getElementById('scroll-area').scrollTop = 0;
  if(tab==='home') buildHome();
  if(tab==='meals') buildMeals();
  if(tab==='gym') buildGym();
  if(tab==='progress') buildProgress();
}

// ===================== HOME =====================
function getLost() { return weightLog.length ? Math.max(0, 91 - Math.min(...weightLog.map(e=>e.kg))) : 0; }
function getCurrent() { return weightLog.length ? weightLog[weightLog.length-1].kg : 91; }

